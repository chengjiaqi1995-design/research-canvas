<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1060" width="1500" height="1060" role="img" aria-labelledby="title desc">
  <title id="title">Research Canvas Portfolio Impact Flow</title>
  <desc id="desc">信息流到 Portfolio Impact 的启动入口、数据来源、模型调用、入库和 UI 输出流程。</desc>
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif;
    }
    .title { fill: #111827; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .lane-label { fill: #374151; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
    .box-title { fill: #111827; font-size: 14px; font-weight: 700; }
    .box-text { fill: #4b5563; font-size: 12px; }
    .tiny { fill: #6b7280; font-size: 10.5px; }
    .code { fill: #374151; font-size: 10.5px; font-family: Menlo, Monaco, Consolas, "Courier New", monospace; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .slate { fill: #f8fafc; stroke: #cbd5e1; }
    .lane { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 7 5; rx: 10; ry: 10; }
    .arrow-label { fill: #374151; font-size: 11px; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1500" height="1060" fill="#ffffff"/>
  <text x="48" y="46" class="title">信息流 → 影响信号 → Portfolio 映射：当前功能运作图</text>
  <text x="48" y="70" class="subtitle">基于当前代码入口：Portfolio Impact tab、/api/portfolio/impacts/run、/agent-context、/agent-apply、FeedItem、Transcription、PortfolioPosition</text>

  <rect x="34" y="100" width="1432" height="116" class="lane"/>
  <text x="54" y="123" class="lane-label">1. 启动入口</text>

  <rect x="70" y="144" width="230" height="52" class="node blue"/>
  <text x="185" y="164" text-anchor="middle" class="box-title">Portfolio Impact UI</text>
  <text x="185" y="183" text-anchor="middle" class="box-text">Run / Codex Direct / filters</text>

  <rect x="360" y="144" width="250" height="52" class="node blue"/>
  <text x="485" y="164" text-anchor="middle" class="box-title">REST API</text>
  <text x="485" y="183" text-anchor="middle" class="code">/api/portfolio/impacts/*</text>

  <rect x="675" y="144" width="230" height="52" class="node orange"/>
  <text x="790" y="164" text-anchor="middle" class="box-title">FMP Ingest Scheduler</text>
  <text x="790" y="183" text-anchor="middle" class="box-text">news / transcripts → feed</text>

  <rect x="970" y="144" width="230" height="52" class="node purple"/>
  <text x="1085" y="164" text-anchor="middle" class="box-title">OpenClaw / Reports</text>
  <text x="1085" y="183" text-anchor="middle" class="box-text">日报 / 周报 / HTML report</text>

  <rect x="1235" y="144" width="190" height="52" class="node green"/>
  <text x="1330" y="164" text-anchor="middle" class="box-title">AI Process</text>
  <text x="1330" y="183" text-anchor="middle" class="box-text">notes / transcripts</text>

  <line x1="300" y1="170" x2="360" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="330" y="160" text-anchor="middle" class="arrow-label">click</text>

  <rect x="34" y="240" width="1432" height="210" class="lane"/>
  <text x="54" y="263" class="lane-label">2. 数据读取与标准化</text>

  <rect x="70" y="292" width="250" height="116" class="node slate"/>
  <text x="195" y="316" text-anchor="middle" class="box-title">FeedItem</text>
  <text x="92" y="338" class="box-text">• type/category/title/content</text>
  <text x="92" y="358" class="box-text">• FMP news / transcript feed</text>
  <text x="92" y="378" class="box-text">• HTML 日报 / 周报 / report</text>
  <text x="92" y="398" class="box-text">• referenceData → REF/source</text>

  <rect x="385" y="292" width="250" height="116" class="node slate"/>
  <text x="510" y="316" text-anchor="middle" class="box-title">Transcription</text>
  <text x="407" y="338" class="box-text">• transcriptText</text>
  <text x="407" y="358" class="box-text">• summary / translatedSummary</text>
  <text x="407" y="378" class="box-text">• organization / industry / topic</text>
  <text x="407" y="398" class="box-text">• mergeSources for daily/weekly</text>

  <rect x="700" y="292" width="270" height="116" class="node slate"/>
  <text x="835" y="316" text-anchor="middle" class="box-title">Portfolio Context</text>
  <text x="722" y="338" class="box-text">• PortfolioPosition long/short/weight</text>
  <text x="722" y="358" class="box-text">• taxonomy: sector/theme/topdown</text>
  <text x="722" y="378" class="box-text">• PortfolioNameMapping aliases</text>
  <text x="722" y="398" class="box-text">• PortfolioResearch chain fields</text>

  <rect x="1060" y="292" width="320" height="116" class="node blue"/>
  <text x="1220" y="316" text-anchor="middle" class="box-title">loadFeeds + loadPositions</text>
  <text x="1082" y="338" class="code">impactController.loadFeeds()</text>
  <text x="1082" y="358" class="code">impactController.loadPositions()</text>
  <text x="1082" y="378" class="box-text">按 days/since/feedItemId 取 feed</text>
  <text x="1082" y="398" class="box-text">按 positionAmount 排序取组合</text>

  <path d="M195 408 V432 H1220 V408" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M510 408 V432" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M835 408 V432" stroke="#16a34a" stroke-width="2" fill="none"/>
  <text x="708" y="426" text-anchor="middle" class="arrow-label">feed + transcript + portfolio context</text>

  <rect x="34" y="474" width="1432" height="294" class="lane"/>
  <text x="54" y="497" class="lane-label">3. 候选召回 → 模型/Agent 判读 → 影响评分</text>

  <rect x="70" y="528" width="255" height="122" class="node orange"/>
  <text x="197" y="552" text-anchor="middle" class="box-title">Deterministic Retriever</text>
  <text x="92" y="574" class="box-text">• buildDirectTerms: 中英文名/ticker</text>
  <text x="92" y="594" class="box-text">• buildTaxonomyTerms: 行业/主题</text>
  <text x="92" y="614" class="box-text">• keyword direction pre-score</text>
  <text x="92" y="634" class="box-text">• 输出 feed-position candidate pairs</text>

  <polygon points="445,526 555,589 445,652 335,589" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="445" y="584" text-anchor="middle" class="box-title">Analyzer?</text>
  <text x="445" y="604" text-anchor="middle" class="tiny">run 参数 / UI 按钮</text>

  <rect x="640" y="500" width="240" height="82" class="node purple"/>
  <rect x="644" y="504" width="232" height="74" rx="8" ry="8" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
  <text x="760" y="526" text-anchor="middle" class="box-title">Gemini LLM</text>
  <text x="760" y="547" text-anchor="middle" class="code">llm-gemini-v1</text>
  <text x="760" y="566" text-anchor="middle" class="tiny">default: gemini-3-flash-preview</text>

  <rect x="640" y="610" width="240" height="82" class="node slate"/>
  <text x="760" y="636" text-anchor="middle" class="box-title">Rule-only path</text>
  <text x="760" y="657" text-anchor="middle" class="code">deterministic-v1</text>
  <text x="760" y="676" text-anchor="middle" class="tiny">无模型调用，直接关键词判断</text>

  <rect x="970" y="500" width="250" height="82" class="node purple"/>
  <text x="1095" y="526" text-anchor="middle" class="box-title">Codex Direct Context</text>
  <text x="1095" y="547" text-anchor="middle" class="code">/agent-context</text>
  <text x="1095" y="566" text-anchor="middle" class="tiny">复制 instructions + items 给 Codex</text>

  <rect x="970" y="610" width="250" height="82" class="node purple"/>
  <text x="1095" y="636" text-anchor="middle" class="box-title">Codex / LLM Analyst</text>
  <text x="1095" y="657" text-anchor="middle" class="code">agent-direct-v1</text>
  <text x="1095" y="676" text-anchor="middle" class="tiny">分析后调用 /agent-apply 回写</text>

  <rect x="1255" y="548" width="165" height="102" class="node green"/>
  <text x="1337" y="572" text-anchor="middle" class="box-title">Impact Scoring</text>
  <text x="1276" y="594" class="box-text">• fundamentalDirection</text>
  <text x="1276" y="614" class="box-text">• portfolioDirection</text>
  <text x="1276" y="634" class="box-text">• confidence / horizon</text>

  <line x1="1220" y1="408" x2="1220" y2="458" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M1220 458 H197 V528" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="325" y1="589" x2="335" y2="589" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="555" y1="560" x2="640" y2="540" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="555" y1="618" x2="640" y2="650" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <path d="M880 541 V478 H1242 V582 H1255" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M535 554 C625 438, 835 438, 970 540" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)" stroke-dasharray="6 4"/>
  <line x1="1220" y1="651" x2="1255" y2="618" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <path d="M880 651 V720 H1242 V618 H1255" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="596" y="529" class="arrow-label">auto default</text>
  <text x="583" y="654" class="arrow-label">rules only</text>
  <text x="804" y="474" class="arrow-label">manual Codex Direct</text>
  <text x="1062" y="471" text-anchor="middle" class="arrow-label">LLM JSON</text>

  <rect x="34" y="792" width="1432" height="162" class="lane"/>
  <text x="54" y="815" class="lane-label">4. 写入结果与 UI 输出</text>

  <rect x="70" y="844" width="255" height="74" class="node green"/>
  <text x="197" y="868" text-anchor="middle" class="box-title">PortfolioFeedImpact</text>
  <text x="92" y="890" class="box-text">feedItemId + positionId 唯一</text>
  <text x="92" y="908" class="box-text">direction / score / thesis / evidenceJson</text>

  <rect x="380" y="844" width="255" height="74" class="node red"/>
  <text x="507" y="868" text-anchor="middle" class="box-title">PortfolioImpactAlert</text>
  <text x="402" y="890" class="box-text">critical / warning / watch</text>
  <text x="402" y="908" class="box-text">long_negative / short_positive 等</text>

  <rect x="690" y="844" width="240" height="74" class="node blue"/>
  <text x="810" y="868" text-anchor="middle" class="box-title">Portfolio Impact Page</text>
  <text x="712" y="890" class="box-text">KPI / Alert queue / Impact feed</text>
  <text x="712" y="908" class="box-text">确认影响 / 忽略影响</text>

  <rect x="985" y="844" width="210" height="74" class="node blue"/>
  <text x="1090" y="868" text-anchor="middle" class="box-title">Feed Detail Strip</text>
  <text x="1007" y="890" class="box-text">当前 feed 的 impacts</text>
  <text x="1007" y="908" class="box-text">显示 affected positions</text>

  <rect x="1250" y="844" width="170" height="74" class="node slate"/>
  <text x="1335" y="868" text-anchor="middle" class="box-title">Overview</text>
  <text x="1272" y="890" class="box-text">activity timeline</text>
  <text x="1272" y="908" class="box-text">impact alert events</text>

  <path d="M1337 650 V746 H197 V844" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="325" y1="881" x2="380" y2="881" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="635" y1="881" x2="690" y2="881" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="930" y1="881" x2="985" y2="881" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="1195" y1="881" x2="1250" y2="881" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <rect x="34" y="978" width="1432" height="58" rx="8" ry="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="54" y="1000" class="box-title">反馈闭环与当前可重构点</text>
  <text x="54" y="1022" class="box-text">人工确认/忽略会更新 impact/alert status；重新分析会把旧结果标记 stale。下一步应把 evidenceJson 拆成 Signal、Match、Evidence、Cluster，减少误报和重复信号。</text>

  <g transform="translate(1015 980)">
    <line x1="0" y1="12" x2="34" y2="12" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="44" y="16" class="tiny">UI/API 控制流</text>
    <line x1="160" y1="12" x2="194" y2="12" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="204" y="16" class="tiny">数据/结果流</text>
    <line x1="320" y1="12" x2="354" y2="12" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="364" y="16" class="tiny">模型/Agent 判读</text>
  </g>
</svg>
