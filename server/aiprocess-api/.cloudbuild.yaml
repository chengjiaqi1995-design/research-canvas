steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-notebook:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/ai-notebook:latest', '.']
    dir: 'backend'

  # 推送镜像到 Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-notebook:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-notebook:latest']

  # 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-notebook'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-notebook:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '5'
      - '--cpu-boost'
      - '--set-env-vars'
      - 'DATABASE_URL=$$DATABASE_URL,GCS_BUCKET_NAME=$$GCS_BUCKET_NAME,GCP_PROJECT_ID=$PROJECT_ID'
      - '--add-cloudsql-instances'
      - '$$CLOUDSQL_CONNECTION_NAME'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,JWT_SECRET=jwt-secret:latest,SESSION_SECRET=session-secret:latest,QWEN_API_KEY=qwen-api-key:latest,ALIYUN_OSS_ACCESS_KEY_ID=aliyun-oss-access-key-id:latest,ALIYUN_OSS_ACCESS_KEY_SECRET=aliyun-oss-access-key-secret:latest,ALIYUN_OSS_BUCKET=aliyun-oss-bucket:latest,ALIYUN_OSS_REGION=aliyun-oss-region:latest'

images:
  - 'gcr.io/$PROJECT_ID/ai-notebook:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-notebook:latest'


